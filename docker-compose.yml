version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: research_db
    environment:
      POSTGRES_DB: agent_db
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: agent_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U agent_user -d agent_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - research_network

  redis:
    image: redis:alpine
    container_name: research_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - research_network

  web:
    build: .
    container_name: research_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./bakend:/app
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://agent_user:agent_password@db:5432/agent_db
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-django-insecure-docker-dev-key}
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,web
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    networks:
      - research_network

volumes:
  postgres_data:
  media_volume:
  redis_data:


networks:
  research_network:
    driver: bridge
