version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: research_db_prod
    environment:
      POSTGRES_DB: agent_db
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - research_network
    restart: always

  redis:
    image: redis:alpine
    container_name: research_redis_prod
    command: redis-server --appendonly yes
    volumes:
      - redis_data_prod:/data
    networks:
      - research_network
    restart: always

  web:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: research_web_prod
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn bakend.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      DATABASE_URL: postgres://agent_user:${DB_PASSWORD}@db:5432/agent_db
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      - db
      - redis
    networks:
      - research_network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: research_nginx_prod
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - media_volume:/media
      - ./frontend/dist:/frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    networks:
      - research_network
    restart: always

volumes:
  postgres_data_prod:
  redis_data_prod:
  static_volume:
  media_volume:


networks:
  research_network:
    driver: bridge
